<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNS 관리 대시보드</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="dashboard-container">
        <!-- 사이드바 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon-small">
                    <svg width="32" height="32" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="24" cy="24" r="20" fill="url(#gradient2)" />
                        <path d="M24 14V34M14 24H34" stroke="white" stroke-width="3" stroke-linecap="round" />
                        <defs>
                            <linearGradient id="gradient2" x1="4" y1="4" x2="44" y2="44">
                                <stop offset="0%" stop-color="#667eea" />
                                <stop offset="100%" stop-color="#764ba2" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h2>DNS 관리</h2>
            </div>

            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-tab="records">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                    </svg>
                    <span>DNS 레코드</span>
                </a>
                <a href="#" class="nav-item" data-tab="zones">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
                    </svg>
                    <span>DNS 존</span>
                </a>
                <a href="#" class="nav-item" data-tab="stats">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                    </svg>
                    <span>통계</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">A</div>
                    <div class="user-details">
                        <div class="user-name" id="userName">관리자</div>
                        <div class="user-role">Administrator</div>
                    </div>
                </div>
                <button class="btn-logout" id="logoutBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4m7 14l5-5-5-5m5 5H9" />
                    </svg>
                </button>
            </div>
        </aside>

        <!-- 메인 콘텐츠 -->
        <main class="main-content">
            <header class="content-header">
                <h1 id="pageTitle">DNS 레코드 관리</h1>
                <button class="btn-primary" id="addRecordBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 4v16m8-8H4" />
                    </svg>
                    새 레코드 추가
                </button>
            </header>

            <!-- DNS 레코드 탭 -->
            <div id="recordsTab" class="tab-content active">
                <div class="search-bar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <path d="M21 21l-4.35-4.35" />
                    </svg>
                    <input type="text" id="searchInput" placeholder="레코드 검색...">
                </div>

                <div class="records-table-container">
                    <table class="records-table">
                        <thead>
                            <tr>
                                <th>타입</th>
                                <th>이름</th>
                                <th>값</th>
                                <th>TTL</th>
                                <th>상태</th>
                                <th>작업</th>
                            </tr>
                        </thead>
                        <tbody id="recordsTableBody">
                            <!-- 동적으로 채워짐 -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- DNS 존 탭 -->
            <div id="zonesTab" class="tab-content">
                <div class="zones-grid" id="zonesGrid">
                    <!-- 동적으로 채워짐 -->
                </div>
            </div>

            <!-- 통계 탭 -->
            <div id="statsTab" class="tab-content">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                                <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2" />
                            </svg>
                        </div>
                        <div class="stat-info">
                            <div class="stat-label">총 레코드</div>
                            <div class="stat-value" id="totalRecords">0</div>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-icon" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                                <path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
                            </svg>
                        </div>
                        <div class="stat-info">
                            <div class="stat-label">DNS 존</div>
                            <div class="stat-value" id="totalZones">0</div>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-icon" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                                <circle cx="12" cy="12" r="10" />
                                <path d="M12 6v6l4 2" />
                            </svg>
                        </div>
                        <div class="stat-info">
                            <div class="stat-label">활성 레코드</div>
                            <div class="stat-value" id="activeRecords">0</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 모달: 레코드 추가/수정 -->
    <div id="recordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">새 DNS 레코드 추가</h2>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>

            <form id="recordForm" class="record-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="recordType">레코드 타입</label>
                        <select id="recordType" name="type" required>
                            <option value="A">A (IPv4 주소)</option>
                            <option value="AAAA">AAAA (IPv6 주소)</option>
                            <option value="CNAME">CNAME (별칭)</option>
                            <option value="MX">MX (메일 서버)</option>
                            <option value="TXT">TXT (텍스트)</option>
                            <option value="NS">NS (네임서버)</option>
                            <option value="PTR">PTR (역방향)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="recordTTL">TTL (초)</label>
                        <input type="number" id="recordTTL" name="ttl" value="3600" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="recordName">레코드 이름</label>
                    <input type="text" id="recordName" name="name" placeholder="예: www.example.com" required>
                </div>

                <div class="form-group">
                    <label for="recordValue">값</label>
                    <input type="text" id="recordValue" name="value" placeholder="예: 192.168.1.1" required>
                </div>

                <div class="form-group" id="priorityGroup" style="display: none;">
                    <label for="recordPriority">우선순위 (MX 레코드)</label>
                    <input type="number" id="recordPriority" name="priority" value="10">
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-secondary" id="cancelBtn">취소</button>
                    <button type="submit" class="btn-primary">저장</button>
                </div>
            </form>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>

</html>
