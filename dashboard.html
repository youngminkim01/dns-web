<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNS 관리 대시보드</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="dashboard-container">
        <!-- 사이드바 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon-small">
                    <svg width="32" height="32" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="24" cy="24" r="20" fill="url(#gradient2)" />
                        <path d="M24 14V34M14 24H34" stroke="white" stroke-width="3" stroke-linecap="round" />
                        <defs>
                            <linearGradient id="gradient2" x1="4" y1="4" x2="44" y2="44">
                                <stop offset="0%" stop-color="#667eea" />
                                <stop offset="100%" stop-color="#764ba2" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h2>DNS 관리</h2>
            </div>

            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-tab="records">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                    </svg>
                    <span>조회된 DNS 레코드</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">A</div>
                    <div class="user-details">
                        <div class="user-name" id="userName">관리자</div>
                        <div class="user-role">Administrator</div>
                    </div>
                </div>
                <button class="btn-logout" id="logoutBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4m7 14l5-5-5-5m5 5H9" />
                    </svg>
                </button>
            </div>
        </aside>

        <!-- 메인 콘텐츠 -->
        <main class="main-content">
            <header class="content-header">
                <h1 id="pageTitle">조회된 DNS 레코드 관리</h1>
                <button class="btn-primary" id="addRecordBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 4v16m8-8H4" />
                    </svg>
                    새 레코드 추가
                </button>
            </header>

            <!-- DNS 레코드 탭 -->
            <div id="recordsTab" class="tab-content active">
                <div class="search-bar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <path d="M21 21l-4.35-4.35" />
                    </svg>
                    <input type="text" id="searchInput" placeholder="레코드 검색...">
                </div>

                <div class="records-table-container">
                    <table class="records-table">
                        <thead>
                            <tr>
                                <th>타입</th>
                                <th>이름</th>
                                <th>값</th>
                                <th>상태</th>
                                <th>작업</th>
                            </tr>
                        </thead>
                        <tbody id="recordsTableBody">
                            <!-- 동적으로 채워짐 -->
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <!-- 모달: 레코드 추가 -->
    <div id="recordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">새 DNS 레코드 추가</h2>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>

            <form id="recordForm" class="record-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="recordType">레코드 타입</label>
                        <input type="text" id="recordType" name="type" value="A" readonly style="cursor: not-allowed;">
                    </div>
                </div>

                <div class="form-group">
                    <label for="recordName">레코드 이름</label>
                    <input type="text" id="recordName" name="name" placeholder="예: www.example.com" required>
                </div>

                <div class="form-group">
                    <label for="recordValue">값</label>
                    <input type="text" id="recordValue" name="value" placeholder="예: 192.168.1.1" required>
                </div>

                <div class="form-group" id="priorityGroup" style="display: none;">
                    <label for="recordPriority">우선순위 (MX 레코드)</label>
                    <input type="number" id="recordPriority" name="priority" value="10">
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-secondary" id="cancelBtn">취소</button>
                    <button type="submit" class="btn-primary">저장</button>
                </div>
            </form>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>

</html>
