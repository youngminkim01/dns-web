# Nginx 리버스 프록시 - dns.aproele.com (포트 없이 접속)
# 80 → Node 3000
#
# 서버에서 적용:
#   sudo cp nginx-dns-web.conf /etc/nginx/sites-available/dns-web
#   sudo ln -sf /etc/nginx/sites-available/dns-web /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default   # 필요 시
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name dns.aproele.com;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
