# Nginx 리버스 프록시 - dns.aproele.com (포트 없이 접속)
# 80 → Node 3000
#
# 서버에서 적용:
#   sudo cp nginx-dns-web.conf /etc/nginx/sites-available/dns-web
#   sudo ln -sf /etc/nginx/sites-available/dns-web /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default   # 필요 시
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name dns.aproele.com;

    # HTTP to HTTPS Redirect
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name dns.aproele.com;

    # SSL Certificate Paths
    ssl_certificate /etc/nginx/ssl/_wildcard_.aproele.com_20260123E16C5.all.crt.pem;
    ssl_certificate_key /etc/nginx/ssl/_wildcard_.aproele.com_20260123E16C5.key.pem;

    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
